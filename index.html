<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AeroKiosk — Web</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .entry-card {
    background: #1e293b;
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .entry-card h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .entry-card p {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .entry-card label {
    display: block;
    text-align: left;
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 6px;
  }
  .entry-card input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #334155;
    border-radius: 8px;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .entry-card input:focus {
    border-color: #3b82f6;
  }
  .entry-card button {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .entry-card button:hover {
    background: #2563eb;
  }
  .entry-card .error {
    color: #ef4444;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .entry-card .version {
    color: #475569;
    font-size: 11px;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="entry-card">
  <h1>AeroKiosk</h1>
  <p>Dashboard kiosque pour aeroclub</p>

  <label for="licenseKey">Cle de licence</label>
  <input type="text" id="licenseKey" placeholder="XXXX-XXXX-XXXX-XXXX" autofocus
         spellcheck="false" autocomplete="off">

  <button id="btnGo" onclick="goToDashboard()">Ouvrir le dashboard</button>

  <div class="error" id="errorMsg"></div>
  <div class="version">Version web — Powered by Triskell</div>
</div>

<script>
  // Pre-remplir avec la cle sauvee
  var savedKey = localStorage.getItem('aerokiosk_license_key') || '';
  if (savedKey) {
    document.getElementById('licenseKey').value = savedKey;
  }

  // Entree = submit
  document.getElementById('licenseKey').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') goToDashboard();
  });

  function goToDashboard() {
    var key = document.getElementById('licenseKey').value.trim();
    if (!key) {
      var err = document.getElementById('errorMsg');
      err.textContent = 'Veuillez entrer votre cle de licence.';
      err.style.display = 'block';
      return;
    }
    // Sauvegarder la cle
    localStorage.setItem('aerokiosk_license_key', key);
    // Rediriger vers le dashboard avec la cle en parametre
    // En mode deploye (kiosk.aerokiosk.app), le dashboard est dashboard.html
    // En mode local (dev), c'est index.html
    var dashPage = window.location.hostname === 'localhost' ? 'index.html' : 'dashboard.html';
    window.location.href = dashPage + '?key=' + encodeURIComponent(key);
  }
</script>
</body>
</html>
